global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'elib-monitor'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # MySQL metrics
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']

  # Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Host metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Application health check
  - job_name: 'elib-app'
    metrics_path: '/healthcheck.php'
    static_configs:
      - targets: ['web:80']
